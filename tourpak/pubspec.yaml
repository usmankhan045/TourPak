name: tourpak
description: "TourPak - Your ultimate travel companion for Pakistan"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend / Database
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.5.4

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI / Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  photo_view: ^0.15.0

  # Sharing / URLs
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

  # Location
  geolocator: ^13.0.2

  # Connectivity
  connectivity_plus: ^6.1.1
  path_provider: ^2.1.5

  # Networking
  dio: ^5.7.0

  # Serialization (runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
